env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  name: Install dependencies
  run: sudo apt-get update && sudo apt-get install -y gcc make      
  build: 
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        chmod +x build.sh
        ./build.sh
